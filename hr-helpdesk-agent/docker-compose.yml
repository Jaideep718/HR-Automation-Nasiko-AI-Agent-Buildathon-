services:
  hr-helpdesk-agent:
    build: .
    container_name: hr-helpdesk-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    stdin_open: true
    ports:
      - "5000"
    tty: true
    networks:
      - agents-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  agents-net:
    external: true
